<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Security Alerts – SpamShield</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: linear-gradient(
    180deg,
    #141010 0%,
    #0b0b0f 40%,
    #050507 100%
  );
}
/* ── Full-page background ── */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;

  background:
    radial-gradient(circle at 50% 20%,
      rgba(255,120,50,0.18) 0%,
      rgba(255,80,30,0.08) 20%,
      transparent 45%),

    radial-gradient(circle at 0% 80%,
      rgba(255,80,30,0.15) 0%,
      transparent 40%),

    radial-gradient(circle at 100% 80%,
      rgba(255,80,30,0.12) 0%,
      transparent 40%),

    linear-gradient(
      180deg,
      #141010 0%,
      #0b0b0f 40%,
      #050507 100%
    );
}
/* Warm glow blobs matching SpamShield dark theme */
.bg::before {
  content: '';
  position: absolute;
  width: 520px; height: 520px;
  border-radius: 50%;
  background: radial-gradient(circle,
rgba(255,120,50,0.35) 0%,
transparent 70%);
}
.bg::after {
  content: '';
  position: absolute;
  width: 380px; height: 280px;
  border-radius: 50%;
 background: radial-gradient(circle,
rgba(255,90,30,0.25) 0%,
transparent 70%);
}

/* Extra side glows */
.glow-left {
  position: fixed;
  width: 260px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(180,50,8,0.16) 0%, transparent 70%);
  top: 30%; left: -80px; filter: blur(60px); z-index: 0;
}
.glow-right {
  position: fixed;
  width: 220px; height: 320px; border-radius: 50%;
  background: radial-gradient(circle, rgba(200,70,10,0.12) 0%, transparent 70%);
  top: 20%; right: -60px; filter: blur(60px); z-index: 0;
}

/* ── Page content ── */
.page {
  position: relative;
  z-index: 2;
  width: 100%;
  min-height: 100vh;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 40px;
}
/* ── Top nav bar ── */
.nav {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: auto;
}
.nav-brand {
  display: flex; align-items: center; gap: 8px;
}
.nav-logo {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #FF6B35, #FF4500);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #fff;
  box-shadow: 0 0 12px rgba(255,100,30,0.5);
}
.nav-name {
  font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.2px;
}
.nav-menu {
  display: flex; flex-direction: column; gap: 4px; cursor: pointer;
}
.nav-menu span {
  display: block; width: 20px; height: 2px;
  background: rgba(255,255,255,0.55); border-radius: 2px;
}

/* ── Hero section ── */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;

  width: 100%;
  max-width: 700px;

  margin: auto 0;
}
/* Shield with glow */
.shield-wrap {
  position: relative;
  width: 140px; height: 140px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
}

/* Glow halo behind shield */
.shield-halo {
  position: absolute;
  inset: -30px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,120,30,0.30) 0%, rgba(220,60,0,0.15) 45%, transparent 70%);
  filter: blur(8px);
  animation: haloPulse 3.5s ease-in-out infinite;
}
.shield-halo-2 {
  position: absolute;
  inset: -15px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,160,60,0.18) 0%, transparent 65%);
  animation: haloPulse 3.5s ease-in-out infinite 0.8s;
}
@keyframes haloPulse {
  0%,100% { opacity: 0.7; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.08); }
}

/* Shield SVG */
.shield-svg {
  position: relative; z-index: 2;
  width: 110px; height: 122px;
  filter: drop-shadow(0 0 22px rgba(255,120,30,0.7))
          drop-shadow(0 0 50px rgba(220,60,0,0.4))
          drop-shadow(0 6px 18px rgba(0,0,0,0.5));
}

/* Check inside shield */
.shield-check {
  position: absolute;
  z-index: 3;
  top: 50%; left: 50%;
  transform: translate(-50%, -58%);
  font-size: 38px; color: #fff;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
}

/* Tag line above heading */
.eyebrow {
  font-size: 13px;
  font-weight: 600;
  color: #FF7A35;
  letter-spacing: 0.4px;
  margin-bottom: 10px;
  text-shadow: 0 0 20px rgba(255,100,30,0.6);
}

.heading {
  font-size: 30px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.8px;
  line-height: 1.15;
  margin-bottom: 14px;
}

.subtitle {
  font-size: 15px;
  font-weight: 400;
  color: rgba(255,255,255,0.50);
  line-height: 1.65;
  max-width: 270px;
  margin-bottom: 36px;
}

/* ── CTA button ── */
.cta-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px 48px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.1px;
  background: linear-gradient(90deg, #FF6B35 0%, #FF4500 50%, #E63900 100%);
  box-shadow:
    0 6px 28px rgba(255,80,20,0.55),
    0 2px 0 rgba(255,200,150,0.2) inset;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}
.cta-btn::after {
  content: '';
  position: absolute;
  top: 0; left: -80%; width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
  transform: skewX(-18deg);
  animation: shimmer 3.5s ease-in-out infinite 1.2s;
}
@keyframes shimmer {
  0%   { left: -80%; }
  55%  { left: 130%; }
  100% { left: 130%; }
}
.cta-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 36px rgba(255,80,20,0.65), 0 2px 0 rgba(255,200,150,0.2) inset;
}
.cta-btn:active { transform: scale(0.97); }

.cta-arrow {
  font-size: 14px;
  opacity: 0.85;
}

/* ── Bottom feature row (matching SpamShield 3-col) ── */

.features {
  width: 100%;
  max-width: 600px;

  display: flex;
  align-items: center;
  justify-content: center;

  gap: 30px;

  margin-top: 50px;
  padding-top: 25px;

  border-top: 1px solid rgba(255,255,255,0.08);
}

.feat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  flex: 1;
}

.feat-icon {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: rgba(255,255,255,0.7);
}

.feat-label {
  font-size: 11.5px;
  font-weight: 500;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.1px;
  text-align: center;
}

.feat-divider {
  width: 1px; height: 36px;
  background: rgba(255,255,255,0.08);
  flex-shrink: 0;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="glow-left"></div>
<div class="glow-right"></div>

<div class="page">

  <!-- Nav bar -->
  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-logo"><i class="fas fa-shield-halved"></i></div>
      <span class="nav-name">PhishGuard</span>
    </div>
   
  </nav>

  <!-- Hero -->
  <div class="hero">

    <!-- Shield -->
    <div class="shield-wrap">
      <div class="shield-halo"></div>
      <div class="shield-halo-2"></div>

      <svg class="shield-svg" viewBox="0 0 110 122" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="110%">
            <stop offset="0%"   stop-color="#FF9550"/>
            <stop offset="45%"  stop-color="#FF6020"/>
            <stop offset="100%" stop-color="#CC3500"/>
          </linearGradient>
          <linearGradient id="sh" x1="0%" y1="0%" x2="60%" y2="100%">
            <stop offset="0%"   stop-color="rgba(255,220,180,0.45)"/>
            <stop offset="100%" stop-color="rgba(255,140,60,0)"/>
          </linearGradient>
        </defs>
        <!-- Shield body -->
        <path d="M55 3 L105 22 L105 60 C105 92 78 114 55 120 C32 114 5 92 5 60 L5 22 Z"
              fill="url(#sg)"/>
        <!-- Inner edge highlight -->
        <path d="M55 12 L97 29 L97 61 C97 87 74 107 55 112 C36 107 13 87 13 61 L13 29 Z"
              fill="none" stroke="rgba(255,200,140,0.3)" stroke-width="1.2"/>
        <!-- Highlight sheen -->
        <path d="M55 3 L105 22 L105 60 C105 92 78 114 55 120 C32 114 5 92 5 60 L5 22 Z"
              fill="url(#sh)" opacity="0.5"/>
      </svg>

      <!-- Checkmark -->
      <div class="shield-check">
        <i class="fas fa-check"></i>
      </div>
    </div>

    <!-- Text -->
    <div class="eyebrow">Instant threat protection</div>
    <h1 class="heading">Security Alerts</h1>
    <p class="subtitle">Get notified the moment a phishing threat is detected and keep your data safe.</p>

    <!-- CTA -->
    <button class="cta-btn">
      <i class="fas fa-bell" style="font-size:15px;"></i>
      Enable Notifications
      <span class="cta-arrow">→</span>
    </button>

  </div>

  <!-- Feature row -->
  <div class="features">
    <div class="feat">
      <div class="feat-icon"><i class="fas fa-bolt"></i></div>
      <span class="feat-label">Real-time Alerts</span>
    </div>
    <div class="feat-divider"></div>
    <div class="feat">
      <div class="feat-icon"><i class="fas fa-circle-check"></i></div>
      <span class="feat-label">Simple to Use</span>
    </div>
    <div class="feat-divider"></div>
    <div class="feat">
      <div class="feat-icon"><i class="fas fa-lock"></i></div>
      <span class="feat-label">Secure</span>
    </div>
  </div>

</div>

</body>
</html>
