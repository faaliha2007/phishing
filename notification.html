
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security Alerts - SpamShield</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-[#05090F] text-white overflow-hidden">

  <!-- Background Effects -->
  <div class="fixed left-0 top-0 -z-10 h-96 w-96 rounded-full bg-[#00E5FF]/10 blur-3xl"></div>

  <div class="fixed bottom-0 right-0 -z-10 h-96 w-96 rounded-full bg-[#00BFA6]/10 blur-3xl"></div>

  <!-- Back Button -->
  <button
    onclick="history.back()"
    class="absolute left-6 top-6 z-50 flex h-10 w-10 items-center justify-center rounded-full border border-[#1B4965] bg-[#0A192F] transition hover:border-[#00E5FF] hover:scale-110"
  >
    <i class="fa-solid fa-arrow-left"></i>
  </button>

  <!-- Main Container -->
  <main class="flex min-h-screen flex-col items-center justify-center px-6">

    <!-- Logo -->
    <div class="mb-10 flex items-center gap-3">

      <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-[#00E5FF] to-[#00BFA6] shadow-lg shadow-cyan-500/30">

        <i class="fa-solid fa-shield-halved text-white"></i>

      </div>

      <span class="text-lg font-bold text-white">
        SpamShield
      </span>

    </div>

    <!-- Shield Section -->
    <div class="relative mb-8">

      <div class="absolute inset-0 rounded-full bg-[#00E5FF]/20 blur-3xl"></div>

      <div class="relative flex h-32 w-32 items-center justify-center rounded-full bg-gradient-to-br from-[#00E5FF] to-[#00BFA6] shadow-2xl shadow-cyan-500/30">

        <i class="fa-solid fa-check text-5xl text-white"></i>

      </div>

    </div>

    <!-- Text -->
    <p class="mb-3 text-sm font-semibold uppercase tracking-[0.3em] text-[#00E5FF]">
      Instant Threat Protection
    </p>

    <h1 class="mb-4 text-center text-4xl font-bold sm:text-5xl">
      Security Alerts
    </h1>

    <p class="max-w-md text-center text-[#B0BEC5] leading-7">
      Get notified the moment a phishing threat is detected and keep your data safe with intelligent protection.
    </p>

    <!-- Button -->
    <a
      href="user.html"
      class="mt-10 inline-flex items-center gap-3 rounded-full bg-gradient-to-r from-[#00E5FF] to-[#00BFA6] px-8 py-4 font-semibold text-[#05090F] shadow-lg shadow-cyan-500/30 transition duration-300 hover:-translate-y-1 hover:shadow-cyan-500/50"
    >
      <i class="fa-solid fa-bell"></i>
      Enable Notifications
      <span>→</span>
    </a>

    <!-- Features -->
    <div class="mt-14 flex flex-wrap justify-center gap-8 text-sm text-[#94A3B8]">

      <div class="flex items-center gap-2">
        <i class="fa-solid fa-bolt text-[#00E5FF]"></i>
        <span>Real-time Alerts</span>
      </div>

      <div class="flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-[#00E5FF]"></i>
        <span>Simple to Use</span>
      </div>

      <div class="flex items-center gap-2">
        <i class="fa-solid fa-lock text-[#00E5FF]"></i>
        <span>Secure</span>
      </div>

    </div>

  </main>

</html>
