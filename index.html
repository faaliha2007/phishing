<body>
  <main class="relative flex min-h-screen items-center justify-center overflow-hidden bg-[#1c1719] px-6 text-white">
    <!-- Background decorations -->
   <!-- Background decorations -->

<div class="absolute bottom-0 right-0 h-72 w-72 rounded-full bg-rose-500/20 blur-3xl"></div>
    <section class="relative z-10 mx-auto max-w-3xl text-center">

      <!-- Shield icon --><!-- Shield background -->
<div class="mx-auto mb-8 flex h-24 w-24 items-center justify-center rounded-3xl bg-gradient-to-br from-orange-400 to-rose-500 shadow-2xl shadow-orange-500/30">

        <svg
          class="h-14 w-14"

<p class="mb-4 text-sm font-semibold uppercase tracking-[0.3em] text-orange-300">

</p>

        <!-- App name -->
<span class="bg-gradient-to-r from-amber-300 to-rose-400 bg-clip-text text-transparent">

</span>

<a

>
  Get Started →
