<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Makes the page responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SpamShield</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
  <main class="relative flex min-h-screen items-center justify-center overflow-hidden bg-[#05090F] px-6 text-white">

    <!-- Background decorations -->
    <div class="absolute left-0 top-0 h-80 w-80 rounded-full bg-[#00E5FF]/10 blur-3xl"></div>
    <div class="absolute bottom-0 right-0 h-80 w-80 rounded-full bg-[#00BFA6]/10 blur-3xl"></div>

    <section class="relative z-10 mx-auto max-w-3xl text-center">

      <!-- Shield Icon -->
      <div class="mx-auto mb-8 flex h-24 w-24 items-center justify-center rounded-3xl bg-gradient-to-br from-[#00E5FF] to-[#00BFA6] shadow-2xl shadow-cyan-500/30">

        <svg
          class="h-14 w-14 text-white"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 3 4.5 6v5.25c0 4.65 3.15 8.7 7.5 9.75 4.35-1.05 7.5-5.1 7.5-9.75V6L12 3Z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m9 12 2 2 4-4"
          />
        </svg>

      </div>

      <!-- Tagline -->
      <p class="mb-4 text-sm font-semibold uppercase tracking-[0.3em] text-[#00E5FF]">
        Smart Spam Protection
      </p>

      <!-- Main Heading -->
      <h1 class="text-4xl font-bold sm:text-5xl md:text-7xl">
        Welcome to
        <span class="bg-gradient-to-r from-[#00E5FF] to-[#00BFA6] bg-clip-text text-transparent">
          SpamShield
        </span>
      </h1>

      <!-- Description -->
      <p class="mx-auto mt-6 max-w-xl text-base leading-7 text-[#B0BEC5] sm:text-lg">
        Detect suspicious messages instantly and keep your inbox protected
        with intelligent spam detection powered by smart analysis.
      </p>

      <!-- Button -->
      <a
        href="notification.html"
        class="mt-10 inline-block rounded-full bg-gradient-to-r from-[#00E5FF] to-[#00BFA6] px-8 py-4 font-semibold text-[#05090F] shadow-lg shadow-cyan-500/25 transition duration-300 hover:-translate-y-1 hover:shadow-cyan-500/40"
      >
        Get Started →
      </a>

      <!-- Features -->
      <div class="mt-12 flex flex-wrap justify-center gap-6 text-sm text-[#94A3B8]">
        <span>✓ Fast Detection</span>
        <span>✓ Simple to Use</span>
        <span>✓ Secure</span>
      </div>

    </section>

  </main>
</body>
</html>
