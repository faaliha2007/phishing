<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>SpamShield - Recent Spam Activity</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="min-h-screen bg-[#05090F] text-white">

  <!-- Background glow effects -->

<div class="fixed bottom-0 right-0 -z-10 h-80 w-80 rounded-full bg-teal-500/10 blur-3xl"></div>
  <!-- Header -->
  <header class="sticky top-0 z-40 flex items-center justify-between border-b border-[#1B4965] bg-[#07162D]/90 px-4 py-4 backdrop-blur-md sm:px-10">

   <!-- Settings button -->

  class="flex items-center gap-2 rounded-xl border border-[#1B4965] bg-white/10 px-3 py-3 transition hover:bg-cyan-500/20 hover:border-cyan-400"
>
  <!-- Settings icon -->
  <svg
    class="h-6 w-6"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    viewBox="0 0 24 24"
  >

      stroke-linejoin="round"

  <span class="hidden font-medium sm:inline">
    Settings
  </span>
</a>

    <!-- Username -->
    <div class="text-center">
      <p class="hidden text-xs text-gray-400 sm:block">
        Welcome back
      </p>

      <h1 class="text-lg font-bold sm:text-2xl">
        Hi,
        <span id="username" class="text-cyan-300">
          Username
        </span>
      </h1>
    </div>

    <!-- Edit profile button -->
  <!-- App logo and name -->
<div class="flex items-center gap-3">

  

  <!-- App name -->
  <span class="hidden bg-gradient-to-r from-cyan-300 to-teal-400 bg-clip-text text-xl font-bold text-transparent sm:inline">
    SpamShield
  </span>

</div>

  </header>

  <!-- Main page content -->
  <main class="mx-auto max-w-5xl px-5 py-10 sm:px-10">

    <!-- Section heading -->
    <section class="mb-8">

      <p class="text-sm font-semibold uppercase tracking-[0.25em] text-cyan-400">
        Message Activity
      </p>

      <h2 class="mt-2 text-3xl font-bold sm:text-5xl">
        Recent Spams
      </h2>

      <p class="mt-3 text-sm text-gray-400 sm:text-base">
        Messages recently identified as spam.
      </p>
     

    </section>

    <!-- spam messages -->
    <section class="space-y-4">

  <a href="whatsapp.html"
   class="block rounded-2xl border border-[#1B4965] bg-[#0A192F] p-5 transition duration-300 hover:-translate-y-1 hover:bg-[#102A43] hover:border-cyan-400">

   <h3 class="text-xl font-semibold text-cyan-300">
  <i class="fa-brands fa-whatsapp mr-2"></i>
  WhatsApp
</h3>

    <p class="mt-2 text-[#B0BEC5]">
      View detected WhatsApp spam messages
    </p>

  </a>

  <a href="sms.html"
   class="block rounded-2xl border border-[#1B4965] bg-[#0A192F] p-5 transition duration-300 hover:-translate-y-1 hover:bg-[#102A43] hover:border-cyan-400">

<h3 class="text-xl font-semibold text-cyan-300">
  <i class="fa-solid fa-message mr-2"></i>
  SMS
</h3>

    <p class="mt-2 text-[#B0BEC5]">
      View detected SMS spam messages
    </p>

  </a>

 <a href="phone.html"
   class="block rounded-2xl border border-[#1B4965] bg-[#0A192F] p-5 transition duration-300 hover:-translate-y-1 hover:bg-[#102A43] hover:border-cyan-400">

<h3 class="text-xl font-semibold text-cyan-300">
  <i class="fa-solid fa-phone mr-2"></i>
  Phone Calls
</h3>

    <p class="mt-2 text-[#B0BEC5]">
      View detected spam calls
    </p>

  </a>

</section>




  </main>

</html>
